# ==============================================
# GameHub Docker Compose
# Usage: docker-compose up -d
# ==============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamehub-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=${DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_ALGOLIA_APP_ID=${NEXT_PUBLIC_ALGOLIA_APP_ID}
      - NEXT_PUBLIC_ADSENSE_CLIENT=${NEXT_PUBLIC_ADSENSE_CLIENT}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - ALGOLIA_APP_ID=${ALGOLIA_APP_ID}
      - ALGOLIA_API_KEY=${ALGOLIA_API_KEY}
      - ALGOLIA_ADMIN_KEY=${ALGOLIA_ADMIN_KEY}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - TIKTOK_API_KEY=${TIKTOK_API_KEY}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - DEFAULT_CLAUDE_MODEL=${DEFAULT_CLAUDE_MODEL}
      - DEFAULT_OPUS_MODEL=${DEFAULT_OPUS_MODEL}
      - DEFAULT_HAIKU_MODEL=${DEFAULT_HAIKU_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DIFY_API_KEY=${DIFY_API_KEY}
      - DIFY_BASE_URL=${DIFY_BASE_URL}
      - DIFY_KNOWLEDGE_ID=${DIFY_KNOWLEDGE_ID}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - CONVERTKIT_API_KEY=${CONVERTKIT_API_KEY}
      - CONVERTKIT_FORM_ID=${CONVERTKIT_FORM_ID}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALERT_EMAIL_ENABLED=${ALERT_EMAIL_ENABLED}
      - ALERT_EMAIL_RECIPIENTS=${ALERT_EMAIL_RECIPIENTS}
      - ALERT_SLACK_ENABLED=${ALERT_SLACK_ENABLED}
      - ALERT_SLACK_WEBHOOK_URL=${ALERT_SLACK_WEBHOOK_URL}
      - ALERT_DISCORD_ENABLED=${ALERT_DISCORD_ENABLED}
      - ALERT_DISCORD_WEBHOOK_URL=${ALERT_DISCORD_WEBHOOK_URL}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - gamehub-network

  # Optional: PostgreSQL database (for future migration to PostgreSQL)
  # To use PostgreSQL, update prisma/schema.prisma provider to "postgresql"
  # and uncomment this section
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: gamehub-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-gamehub}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamehub_secret}
  #     POSTGRES_DB: ${POSTGRES_DB:-gamehub}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gamehub}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - gamehub-network

networks:
  gamehub-network:
    driver: bridge

